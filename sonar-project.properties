# SonarQube Project Configuration
sonar.projectKey=gmh-sarl
sonar.projectName=GMH SARL
sonar.projectVersion=1.0

# SonarQube server URL (local instance)
sonar.host.url=http://localhost:9000
# IMPORTANT: Set your token via command line or environment variable:
#   sonar-scanner -Dsonar.token=YOUR_TOKEN
# Or create a .sonar-token file (add to .gitignore)

# Source code
sonar.sources=api,config,includes,pages,index.php
sonar.tests=tests

# Language
sonar.language=php
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/vendor/**,**/node_modules/**,**/coverage/**,**/assets/vendor/**,**/assets/js/**,**/tests/performance/**,**/images/**,**/gmh-sarl-website-complete/**

# Coverage reports
sonar.php.coverage.reportPaths=coverage/coverage.xml
sonar.php.tests.reportPath=coverage/junit.xml

# Test exclusions (don't count test files in coverage)
# Exclude API files (they require HTTP context and cannot be unit tested)
# Exclude config files that require runtime context
sonar.coverage.exclusions=**/tests/**,**/*Test.php,**/bootstrap.php,**/api/**,**/config/db.php,**/config/db_connection.php,**/config/https.php,**/config/security.php,**/config/env.php,**/pages/**,**/includes/**,**/index.php
